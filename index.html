input,textarea,button,select{font-family:'DM Mono',monospace}

.tab-btn.active{color:white}

(function(){
  var c=document.getElementById('stars');

  }
})();

// ── URL SHARE ─────────────────────────────────────────
function encodeChart(p){
  try{return btoa(unescape(encodeURIComponent(JSON.stringify(p))));}catch(e){return '';}
}
function decodeChart(s){
  try{return JSON.parse(decodeURIComponent(escape(atob(s))));}catch(e){return null;}
}
function getShareUrl(p){return window.location.href.split('?')[0]+'?chart='+encodeChart(p);}
function checkUrlChart(){
  try{
    var params=new URLSearchParams(window.location.search);
    var c=params.get('chart');
    if(c){var p=decodeChart(c);if(p&&p.name&&p.dob){p.id=mkId();p.color=p.color||COLORS[0];people.push(p);selIdx=people.length-1;lsSave();history.replaceState({},'',window.location.pathname);}}
  }catch(e){}
}

// ── CALC ENGINES ─────────────────────────────────────
var PY={A:1,B:2,C:3,D:4,E:5,F:6,G:7,H:8,I:9,J:1,K:2,L:3,M:4,N:5,O:6,P:7,Q:8,R:9,S:1,T:2,U:3,V:4,W:5,X:6,Y:7,Z:8};
var VW=['A','E','I','O','U'];
function rN(n){if([11,22,33].indexOf(n)>=0)return n;while(n>9){n=String(n).split('').reduce(function(a,b){return a+parseInt(b);},0);if([11,22,33].indexOf(n)>=0)return n;}return n;}
function norm(name){return name.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().replace(/[^A-Z]/g,'');}
function cExpr(n){return rN(norm(n).split('').reduce(function(a,c){return a+(PY[c]||0);},0));}
function cSoul(n){return rN(norm(n).split('').filter(function(c){return VW.indexOf(c)>=0;}).reduce(function(a,c){return a+(PY[c]||0);},0));}
function cQuiet(n){return rN(norm(n).split('').filter(function(c){return VW.indexOf(c)<0&&PY[c];}).reduce(function(a,c){return a+PY[c];},0));}
function cLP(dob){var p=dob.replace(/-/g,'');return rN(p.split('').reduce(function(a,b){return a+parseInt(b);},0));}
function cBD(dob){return rN(parseInt(dob.split('-')[2]));}
function cPin(dob){var p=dob.split('-');return rN(rN(parseInt(p[1]))+rN(parseInt(p[2])));}

// Personal Year = month + day digits + current year digits, reduced
function personalYear(dob){
  var today=new Date();var yr=today.getFullYear();
  var p=dob.split('-');var m=p[1];var d=p[2];
  var digits=(m+d+String(yr)).split('');
  return rN(digits.reduce(function(a,b){return a+parseInt(b);},0));
}

// Sun sign (tropical, verified)
function sunSign(dob){
  var p=dob.split('-').map(Number),m=p[1],d=p[2],md=m*100+d;
  if(md>=321&&md<=419)return'Aries';if(md>=420&&md<=520)return'Taurus';

  if(md>=723&&md<=822)return'Leo';if(md>=823&&md<=922)return'Virgo';
  if(md>=923&&md<=1022)return'Libra';if(md>=1023&&md<=1121)return'Scorpio';
  if(md>=1122&&md<=1221)return'Sagittarius';if(md>=1222||md<=119)return'Capricorn';
  if(md>=120&&md<=218)return'Aquarius';return'Pisces';
}

// Approximate sun longitude (degrees) from DOB
function sunLongitude(dob){
  var yr=parseInt(dob.split('-')[0]);
  var dayOfYear=Math.floor((new Date(dob+'T12:00:00')-new Date(yr+'-01-01'))/86400000);
  // Vernal equinox ~March 20 = day 79. Sun at 0° Aries on that day.
  return ((dayOfYear-79)/365.25*360+360)%360;
}

// Vedic / Jyotish
function lahiriAyanamsa(yr){return 23.85+0.0137*(yr-2000);}
function tropToSid(tropDeg,yr){return ((tropDeg-lahiriAyanamsa(yr))%360+360)%360;}
var SIGNS=['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];
function siderealSign(dob){
  var yr=parseInt(dob.split('-')[0]);
  var trop=sunLongitude(dob);
  var sid=tropToSid(trop,yr);
  return SIGNS[Math.floor(sid/30)];
}

// ── CHART HELPER FUNCTIONS ───────────────────────────────────────────────────
function lonToSign(lon) {
  return SIGNS[Math.floor(((lon%360)+360)%360/30)];
}
function lonToDeg(lon) {
  return (((lon%360)+360)%360%30).toFixed(1);
}
function lonToHouse(lon, cusps) {
  if(!cusps||!cusps.length) return null;
  var l=((lon%360)+360)%360;
  for(var i=0;i<12;i++){
    var c1=((cusps[i]%360)+360)%360;
    var c2=((cusps[(i+1)%12]%360)+360)%360;
    if(c2<c1){if(l>=c1||l<c2)return i+1;}
    else{if(l>=c1&&l<c2)return i+1;}
  }
  return 1;
}
function calcAspects(planets) {
  var aspects=[];
  var TYPES=[
    {name:'conjunction', angle:0,   orb:8},
    {name:'sextile',     angle:60,  orb:6},
    {name:'square',      angle:90,  orb:8},
    {name:'trine',       angle:120, orb:8},
    {name:'opposition',  angle:180, orb:8}
  ];
  for(var i=0;i<planets.length;i++){
    for(var j=i+1;j<planets.length;j++){
      var diff=Math.abs(planets[i].lon-planets[j].lon);
      if(diff>180)diff=360-diff;
      TYPES.forEach(function(asp){
        var orb=Math.abs(diff-asp.angle);
        if(orb<=asp.orb){
          aspects.push({
            planet1:planets[i].name,
            planet2:planets[j].name,
            type:asp.name,
            orb:orb
          });
        }
      });
    }
  }
  return aspects.sort(function(a,b){return a.orb-b.orb;});
}

function downloadApp() {
  var doctype = '<!DOCTYPE html>';
  var html = doctype + document.documentElement.outerHTML;
  var blob = new Blob([html], {type: 'text/html;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'cosmic-dashboard.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
}

    var card=el('div',{cls:'person-card',style:{background:i===selIdx?'linear-gradient(135deg,'+p.color+'18,'+p.color+'08)':'rgba(255,255,255,0.025)',border:'1px solid '+(i===selIdx?p.color:'rgba(255,255,255,0.07)'),boxShadow:i===selIdx?'0 0 14px '+p.color+'28':'none'}},[
      span({fontSize:'17px',flexShrink:'0'},SG[sign]),
      el('div',{style:{flex:'1',minWidth:'0'}},[el('div',{style:{color:p.color,fontFamily:"'Playfair Display',serif",fontSize:'14px',fontWeight:'600',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},[p.name]),el('div',{style:{color:'rgba(255,255,255,0.28)',fontSize:'10px'}},[sunSign(p.dob)+' · '+p.dob])]),
      btn({background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'7px',color:'rgba(255,255,255,0.45)',fontSize:'12px',padding:'4px 9px',flexShrink:'0'},'✏',function(e){e.stopPropagation();buildEditModal(i);})
    ]);
    card.onclick=function(){selIdx=i;showForm=false;activeTab='Astrology';render();};
    listWrap.appendChild(card);
  });
  app.appendChild(listWrap);

  var person=people[selIdx];
  if(person){
    var tabBar=el('div',{style:{display:'flex',overflowX:'auto',borderBottom:'1px solid rgba(255,255,255,0.06)',padding:'0 16px',marginTop:'4px'}});
    TABS.forEach(function(t){var b=el('button',{cls:'tab-btn '+(t===activeTab?'active':'inactive'),style:{borderBottomColor:t===activeTab?person.color:'transparent'}},[t.toUpperCase()]);b.onclick=function(){activeTab=t;render();};tabBar.appendChild(b);});
    app.appendChild(tabBar);
    var content=el('div',{style:{padding:'13px 16px 52px',animation:'fadeIn 0.2s ease'}});
    if(activeTab==='Astrology')content.appendChild(buildAstrology(person));
    else if(activeTab==='Vedic')content.appendChild(buildVedic(person));
    else if(activeTab==='Numerology')content.appendChild(buildNumerology(person));
    else if(activeTab==='World Cal')content.appendChild(buildWorld(person));
    else if(activeTab==='Runes & Celtic')content.appendChild(buildRunesCeltic(person));
    else if(activeTab==='Human Design')content.appendChild(buildHD(person));
    else if(activeTab==='Synastry')content.appendChild(buildSynastry(person));
    app.appendChild(content);
  }

  app.appendChild(el('div',{style:{textAlign:'center',padding:'0 16px 24px',color:'rgba(255,255,255,0.1)',fontSize:'9px',letterSpacing:'0.1em'}},['CHARTS AUTO-SAVED IN BROWSER · TAP ✏ TO EDIT · v0.9']));
}

</htmlfunction calcFullChart(p) {
  var cacheKey=(p.id||p.name)+'_'+p.dob+'_'+(p.tob||'')+'_'+(p.pob||'');
  if(_chartCache[cacheKey])return Promise.resolve(_chartCache[cacheKey]);

  var parts=p.dob.split('-').map(Number);
  var hour=p.tob?(function(){var t=p.tob.split(':');return parseInt(t[0])+parseInt(t[1]||0)/60;}()):12;
  var jd=julianDay(parts[0],parts[1],parts[2],hour);
  var tau=(jd-2451545)/365250;

  // All planets calculated instantly, no network needed
  var rawPlanets=[
    {name:'Sun',      lon:sunLon(jd)},
    {name:'Moon',     lon:moonLon(jd)},
    {name:'Mercury',  lon:_mercury(tau)},
    {name:'Venus',    lon:_venus(tau)},
    {name:'Mars',     lon:_mars(tau)},
    {name:'Jupiter',  lon:_jupiter(tau)},
    {name:'Saturn',   lon:_saturn(tau)},
    {name:'Uranus',   lon:_uranus(tau)},
    {name:'Neptune',  lon:_neptune(tau)},
    {name:'Pluto',    lon:plutoLon(jd)},
    {name:'North Node',lon:northNodeLon(jd)},
    {name:'South Node',lon:_n(northNodeLon(jd)+180)}
  ];

  function buildResult(cusps, asc, mc) {
    return {
      planets: rawPlanets.map(function(pl){
        return {name:pl.name, sign:lonToSign(pl.lon), position:parseFloat(lonToDeg(pl.lon)),
                longitude:pl.lon, house:cusps?lonToHouse(pl.lon,cusps):null};
      }),
      ascendant: asc?{sign:lonToSign(asc),position:parseFloat(lonToDeg(asc)),longitude:asc}:null,
      midheaven:  mc ?{sign:lonToSign(mc), position:parseFloat(lonToDeg(mc)), longitude:mc} :null,
      houses: cusps?cusps.map(function(c,i){return{number:i+1,sign:lonToSign(c),position:parseFloat(lonToDeg(c)),longitude:c};}): [],
      aspects: calcAspects(rawPlanets),
      calculated: 'vsop87'
    };
  }

  // No birth time — planets only
  if(!p.tob){
    var r=buildResult(null,null,null);
    _chartCache[cacheKey]=r;
    return Promise.resolve(r);
  }

  // Has birth time — geocode city for houses/ASC, then build result
  function noLocation(msg) {
    var r=buildResult(null,null,null);
    r.geoError=msg;
    _chartCache[cacheKey]=r;
    return r;
  }

  if(!p.pob){
    return Promise.resolve(noLocation('Add birth city to unlock houses and Rising sign.'));
  }

  return fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(p.pob)+'&format=json&limit=1&accept-language=en',
    {headers:{'User-Agent':'CosmicDashboard/1.0'}})
  .then(function(r){return r.json();})
  .then(function(geo){
    if(!geo||!geo[0])return noLocation('City not found. Try e.g. "Los Angeles, CA, USA".');
    var lat=parseFloat(geo[0].lat),lng=parseFloat(geo[0].lon);
    var h=calcHouses(jd,lat,lng);
    var result=buildResult(h.cusps,h.asc,h.mc);
    result.tzOff=h.tzOff;
    _chartCache[cacheKey]=result;
    return result;
  })
  .catch(function(){
    return noLocation('No internet for city lookup — showing planets only. Houses require a one-time online lookup.');
  });
}>
